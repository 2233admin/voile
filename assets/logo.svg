<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#0d0a1a"/>

  <!-- Outer magic circle -->
  <circle cx="200" cy="185" r="155" fill="none" stroke="#6d28d9" stroke-width="1.2" stroke-dasharray="6 4" opacity="0.6"/>
  <circle cx="200" cy="185" r="130" fill="none" stroke="#7c3aed" stroke-width="0.8" opacity="0.4"/>

  <!-- Rune marks on outer circle (8 positions) -->
  <g fill="#9b59b6" opacity="0.7" font-family="serif" font-size="11">
    <text x="200" y="27" text-anchor="middle">*</text>
    <text x="310" y="65" text-anchor="middle">*</text>
    <text x="352" y="185" text-anchor="middle">*</text>
    <text x="310" y="308" text-anchor="middle">*</text>
    <text x="200" y="347" text-anchor="middle">*</text>
    <text x="90" y="308" text-anchor="middle">*</text>
    <text x="48" y="185" text-anchor="middle">*</text>
    <text x="90" y="65" text-anchor="middle">*</text>
  </g>

  <!-- Book shadow -->
  <path d="M118 130 C140 124 175 127 200 132 L200 262 C175 257 140 260 118 266 Z" fill="#0a0618" opacity="0.5" transform="translate(4,4)"/>

  <!-- Book left page -->
  <path d="M118 130 C140 124 175 127 200 132 L200 262 C175 257 140 260 118 266 Z" fill="#1a0f3a" stroke="#7c3aed" stroke-width="1.5"/>

  <!-- Book right page -->
  <path d="M282 130 C260 124 225 127 200 132 L200 262 C225 257 260 260 282 266 Z" fill="#1a0f3a" stroke="#7c3aed" stroke-width="1.5"/>

  <!-- Spine glow -->
  <line x1="200" y1="130" x2="200" y2="263" stroke="#c084fc" stroke-width="3" opacity="0.9"/>
  <line x1="200" y1="130" x2="200" y2="263" stroke="#e9d5ff" stroke-width="1" opacity="0.6"/>

  <!-- Left page text lines -->
  <line x1="135" y1="163" x2="191" y2="161" stroke="#6d28d9" stroke-width="1" opacity="0.7"/>
  <line x1="133" y1="175" x2="189" y2="173" stroke="#6d28d9" stroke-width="1" opacity="0.7"/>
  <line x1="131" y1="187" x2="188" y2="185" stroke="#6d28d9" stroke-width="1" opacity="0.5"/>
  <line x1="130" y1="199" x2="187" y2="197" stroke="#6d28d9" stroke-width="1" opacity="0.5"/>
  <line x1="129" y1="211" x2="186" y2="209" stroke="#6d28d9" stroke-width="1" opacity="0.4"/>
  <line x1="128" y1="223" x2="185" y2="221" stroke="#6d28d9" stroke-width="1" opacity="0.3"/>

  <!-- Right page text lines -->
  <line x1="265" y1="163" x2="209" y2="161" stroke="#6d28d9" stroke-width="1" opacity="0.7"/>
  <line x1="267" y1="175" x2="211" y2="173" stroke="#6d28d9" stroke-width="1" opacity="0.7"/>
  <line x1="269" y1="187" x2="212" y2="185" stroke="#6d28d9" stroke-width="1" opacity="0.5"/>
  <line x1="270" y1="199" x2="213" y2="197" stroke="#6d28d9" stroke-width="1" opacity="0.5"/>
  <line x1="271" y1="211" x2="214" y2="209" stroke="#6d28d9" stroke-width="1" opacity="0.4"/>
  <line x1="272" y1="223" x2="215" y2="221" stroke="#6d28d9" stroke-width="1" opacity="0.3"/>

  <!-- Left page pentagram -->
  <polygon points="158,138 161.5,149 173,149 164,156 167,167 158,160 149,167 152,156 143,149 154.5,149"
           fill="none" stroke="#c084fc" stroke-width="1.2" opacity="0.85"/>
  <circle cx="158" cy="153" r="2" fill="#c084fc" opacity="0.7"/>

  <!-- Right page pentagram -->
  <polygon points="242,138 245.5,149 257,149 248,156 251,167 242,160 233,167 236,156 227,149 238.5,149"
           fill="none" stroke="#c084fc" stroke-width="1.2" opacity="0.85"/>
  <circle cx="242" cy="153" r="2" fill="#c084fc" opacity="0.7"/>

  <!-- Scattered stars -->
  <circle cx="200" cy="68" r="2.5" fill="#f3e8ff" opacity="0.9"/>
  <circle cx="95"  cy="98" r="1.8" fill="#e9d5ff" opacity="0.8"/>
  <circle cx="305" cy="90" r="1.5" fill="#e9d5ff" opacity="0.7"/>
  <circle cx="72"  cy="200" r="1.5" fill="#c084fc" opacity="0.7"/>
  <circle cx="328" cy="215" r="2"   fill="#c084fc" opacity="0.7"/>
  <circle cx="128" cy="310" r="1.5" fill="#e9d5ff" opacity="0.5"/>
  <circle cx="273" cy="305" r="1.8" fill="#e9d5ff" opacity="0.6"/>
  <circle cx="152" cy="52" r="1.3" fill="#e9d5ff" opacity="0.6"/>
  <circle cx="248" cy="58" r="1.3" fill="#e9d5ff" opacity="0.6"/>

  <!-- Title -->
  <text x="200" y="308" text-anchor="middle"
        fill="#c084fc" font-family="Georgia, 'Times New Roman', serif"
        font-size="34" letter-spacing="12" font-weight="normal">VOILE</text>

  <!-- Subtitle -->
  <text x="200" y="330" text-anchor="middle"
        fill="#7c3aed" font-family="Georgia, 'Times New Roman', serif"
        font-size="11" letter-spacing="3" opacity="0.8">the Magic Library</text>

  <!-- Bottom rule -->
  <line x1="110" y1="342" x2="290" y2="342" stroke="#6d28d9" stroke-width="0.6" opacity="0.5"/>
  <circle cx="110" cy="342" r="1.5" fill="#6d28d9" opacity="0.5"/>
  <circle cx="290" cy="342" r="1.5" fill="#6d28d9" opacity="0.5"/>
  <circle cx="200" cy="342" r="1" fill="#9b59b6" opacity="0.7"/>
</svg>
