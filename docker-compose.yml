version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]
    command: redis-server --appendonly yes

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: voile
      POSTGRES_USER: voile
      POSTGRES_PASSWORD: voile_dev
    ports: ["5432:5432"]
    volumes: ["pg_data:/var/lib/postgresql/data"]

  cleaner:
    build:
      context: ./kernel
      dockerfile: cleaner/Dockerfile
    ports: ["50051:50051"]
    restart: unless-stopped

  ann:
    build:
      context: ./kernel
      dockerfile: ann/Dockerfile
    ports: ["50052:50052"]
    restart: unless-stopped

  gateway-api:
    build:
      context: ./gateway
      dockerfile: Dockerfile
      args:
        CMD: api
    ports: ["8080:8080"]
    environment:
      VOILE_DB_URL: postgres://voile:voile_dev@postgres:5432/voile
      VOILE_REDIS_URL: redis://redis:6379/0
    depends_on: [redis, postgres]
    restart: unless-stopped

  gateway-qq:
    build:
      context: ./gateway
      dockerfile: Dockerfile
      args:
        CMD: qq
    environment:
      # Default points at lagrange service; override with ONEBOT_WS=ws://host:3001 if using external bot
      ONEBOT_WS: ${ONEBOT_WS:-ws://lagrange:3001}
      DOWNSTREAM: http://gateway-api:8080/ingest/qq
    depends_on: [gateway-api]
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      VOILE_DB_URL: postgresql://voile:voile_dev@postgres:5432/voile
      VOILE_REDIS_URL: redis://redis:6379/0
      VOILE_CLEANER_ADDR: cleaner:50051
      VOILE_ANN_ADDR: ann:50052
      VOILE_OBSIDIAN_VAULT: /obsidian
    volumes:
      # Set OBSIDIAN_HOST_PATH to your vault directory, e.g. E:/knowledge
      - ${OBSIDIAN_HOST_PATH:-./obsidian-vault}:/obsidian
    depends_on: [redis, postgres, cleaner, ann]
    restart: unless-stopped

  # Optional QQ bot -- start with: docker compose --profile qq up
  lagrange:
    image: lagrangedev/lagrange.onebot:latest
    profiles: [qq]
    volumes:
      - ./lagrange:/app/data
    ports: ["3001:3001"]
    restart: unless-stopped

volumes:
  redis_data:
  pg_data:
